<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>WF × CJ · dropshipper value carousels</title>
<style>
  :root{--ink:#16181d;--ink2:#3c4148;--mut:#71777f;--faint:#9aa0a6;--line:#e7e7e4;--bg:#fbfbf9;--card:#fff;--ok:#3f7d58;--accent:#16181d;--rec:#b07a2b;--dot:#d63384;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font:15px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);padding-bottom:120px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:880px;margin:0 auto;padding:48px 24px 0}
  h1{font-size:27px;letter-spacing:-.02em;font-weight:650;margin-bottom:8px}
  .lede{color:var(--ink2);font-size:15.5px;max-width:64ch;margin-bottom:6px}
  .stamp{color:var(--faint);font-size:12.5px;margin-bottom:8px}
  h2{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--mut);font-weight:650;margin:40px 0 4px;display:flex;align-items:baseline;gap:10px}
  .ct{font-size:12px;color:var(--faint);letter-spacing:.02em;text-transform:none;font-weight:500}
  .ct.full{color:var(--ok)}
  .sub{color:var(--mut);font-size:13.5px;margin-bottom:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:15px 17px;margin-bottom:11px;cursor:pointer;transition:border-color .12s,box-shadow .12s;position:relative}
  .card:hover{border-color:#cfd2cc}
  .card.sel{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
  .row{display:flex;gap:13px;align-items:flex-start}
  .tick{flex:none;width:22px;height:22px;border-radius:6px;border:1.5px solid #c4c4bf;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:.12s}
  .tick svg{width:12px;height:12px;opacity:0;transition:.12s}
  .card.sel .tick{background:var(--accent);border-color:var(--accent)}
  .card.sel .tick svg{opacity:1}
  .body{flex:1;min-width:0}
  .name{font-weight:600;font-size:15px;letter-spacing:-.01em}
  .name .rec{font-size:11px;color:var(--rec);font-weight:650;margin-left:8px}
  .name .tag{font-size:11px;color:var(--ok);font-weight:650;margin-left:8px}
  .meta{font-size:12.5px;color:var(--faint);font-family:ui-monospace,Menlo,monospace;margin:1px 0 6px}
  .desc{font-size:13.5px;color:var(--ink2);line-height:1.5}
  .desc b{color:var(--ink);font-weight:600}
  .strip{display:flex;gap:9px;overflow-x:auto;margin:13px 0 2px;padding-bottom:8px;scrollbar-width:thin}
  .tile{flex:none;width:196px;height:245px;border:1px solid var(--line);border-radius:10px;background:#fdfdfb;padding:13px 13px 11px;display:flex;flex-direction:column;cursor:default}
  .tile .n{font-size:10px;color:var(--faint);font-family:ui-monospace,Menlo,monospace;letter-spacing:.04em;display:flex;align-items:center;gap:6px;margin-bottom:8px}
  .tile .n::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--dot);display:inline-block}
  .tile .h{font-size:13.5px;font-weight:650;line-height:1.3;letter-spacing:-.01em;margin-bottom:7px}
  .tile .b{font-size:11px;color:var(--mut);line-height:1.5;overflow:hidden}
  .cap{margin-top:9px;border-top:1px solid var(--line);padding-top:9px}
  .cap .cl{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--faint);font-weight:650;margin-bottom:3px}
  .cap .cx{font-size:12.5px;color:var(--ink2);line-height:1.5;font-family:ui-monospace,Menlo,monospace}
  .note{margin-top:11px;display:none}
  .card.sel .note{display:block}
  .note label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);font-weight:600;display:block;margin-bottom:5px}
  .note textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font:13px/1.45 inherit;resize:vertical;min-height:34px;color:var(--ink);background:#fcfcfa}
  .note textarea:focus{outline:none;border-color:var(--mut)}
  .global{margin-top:20px}
  .global label{font-size:13px;color:var(--mut);font-weight:600;display:block;margin-bottom:7px}
  .global textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 13px;font:14px/1.5 inherit;resize:vertical;min-height:60px;background:var(--card)}
  .global textarea:focus{outline:none;border-color:var(--mut)}
  .bar{position:fixed;left:0;right:0;bottom:0;background:rgba(251,251,249,.92);backdrop-filter:blur(10px);border-top:1px solid var(--line);padding:14px 24px}
  .bar-in{max-width:880px;margin:0 auto;display:flex;align-items:center;gap:16px;justify-content:space-between}
  .status{font-size:13px;color:var(--mut)} .status b{color:var(--ink)}
  .btn{border:0;background:var(--ink);color:#fff;font:600 14px/1 inherit;padding:13px 22px;border-radius:10px;cursor:pointer;transition:.12s;white-space:nowrap}
  .btn:disabled{background:#c8cdc6;cursor:not-allowed}
  .btn.done{background:var(--ok)}
  @media(max-width:620px){.wrap{padding:32px 16px 0}.bar-in{flex-direction:column;align-items:stretch;gap:10px}.btn{width:100%}}
</style>
</head>
<body>
<div class="wrap">
  <h1 id="title"></h1>
  <p class="lede" id="intro"></p>
  <p class="stamp" id="stamp"></p>
  <div id="sections"></div>
  <div class="global" id="globalWrap" style="display:none">
    <label id="gnoteLabel"></label>
    <textarea id="gnote"></textarea>
  </div>
</div>
<div class="bar"><div class="bar-in">
  <div class="status" id="status"></div>
  <button class="btn" id="copy" disabled>Copy prompt</button>
</div></div>
<script>
/* === DECK START === */
const DECK = {
  title: "WF × CJ · value carousels for EU dropshippers",
  intro: "v3. Five value-first co-branded carousel concepts for the IG Collab post: how the two brands help European dropshippers in 2026. CJ's lane is product and fulfilment, WorldFirst's lane is money. Hooks now state the value plainly, no cleverness tax. Budapest stays off the slides; one caption line only if CJ wants the nod.",
  stamp: "2026-07-10 · v3 clarity-first hooks · ICP: independent dropshippers selling across Europe",
  promptHeader: "cj budapest ig carousel picks",
  promptAction: "Render the picked concept into finished 1080×1350 frames via the design-system pipeline (HTML + Poppins, WF × CJ co-brand), then package final caption + collab publishing plan (who posts, who accepts, tags) for Scarlett and Attila.",
  globalNote: { label: "Anything else (optional)", placeholder: "tone shifts, slides to swap, add a Budapest caption line or not, publish timing..." },
  sections: [
    { key:"concepts", label:"Carousel concepts", sub:"One collab post goes out; suggest picking 1. Every concept keeps both brands in-lane and teaches something the ICP saves. CJ numbers are from their own materials.", pick:1, notes:true,
      items:[
        { name:"A · Where your margin leaks", meta:"unit economics · 8 slides · save-bait", rec:true,
          desc:"<b>The margin piece.</b> Follows one €40 order through four common leaks and gives the fix for each. Money pain is the highest-save topic with dropshippers, and every fix lands naturally in one of the two lanes.",
          slides:[
            {h:"4 margin fixes for dropshippers in 2026", b:"Where profit leaks on a typical order, and how to plug each leak. WorldFirst × CJ Dropshipping."},
            {h:"The €40 order, on paper.", b:"Sell at €40. Product €12, shipping €6, ads €14. €8 left. Here is where that €8 shrinks."},
            {h:"Leak 1: slow delivery.", b:"Late orders turn into refunds, disputes and one-star reviews. Fix: CJ ships from Germany and partner warehouses across Europe, up to two days faster this year."},
            {h:"Leak 2: supplier payment fees.", b:"Transfer fees plus days of waiting cost you twice. Fix: WorldFirst pays CJ Dropshipping instantly, with zero transaction fees."},
            {h:"Leak 3: bad exchange rates.", b:"Auto-converting every payout at whatever rate you're given is a hidden cost. Fix: collect in local currencies, convert when the rate suits you."},
            {h:"Leak 4: no cashback on your biggest bills.", b:"Ads, logistics and software are your largest costs. Fix: put them on 1% cashback and take some back every month."},
            {h:"Same order, all leaks plugged.", b:"Fewer refunds, zero payment fees, better rates, 1% back. Small fixes, real margin."},
            {h:"CJ moves the product. WorldFirst moves the money.", b:"Two brands, one job: you keep more of every order. Save this for your next pricing review."}
          ],
          caption:"Four ways dropshipping margin leaks in Europe, and the fix for each 🇪🇺 With @cjdropshipping. Save it for your next pricing review.  #dropshipping #ecommerce #ecommercetips #worldfirst"},
        { name:"B · Sell like a local, everywhere in Europe", meta:"localisation · 8 slides · most EU-native",
          desc:"<b>The Europe play.</b> Europe is 20+ markets in one; this walks the four things local sellers get right and how to get each one without being local. CJ covers the shelf, WorldFirst covers the bank.",
          slides:[
            {h:"How to sell like a local across Europe", b:"Faster delivery, local currencies, no surprise fees, in 20+ markets at once. WorldFirst × CJ Dropshipping."},
            {h:"Deliver from inside Europe.", b:"CJ's Frankfurt warehouse plus partner warehouses in the UK, Poland, Spain and France put stock days from your customers."},
            {h:"No surprise fees at the door.", b:"EU-stocked inventory arrives customs-cleared. Customers pay what they saw at checkout, nothing more."},
            {h:"Sell where locals already buy.", b:"Beyond Amazon: bol in the Netherlands, Allegro in Poland, Cdiscount in France, Kaufland in Germany."},
            {h:"Collect in local currencies.", b:"EUR, GBP, PLN and more, from 130+ marketplaces. Hold it and convert when the rate works for you."},
            {h:"Pay your supplier instantly.", b:"WorldFirst to CJ Dropshipping: instant, zero transaction fees. Orders start moving the moment you pay."},
            {h:"The local checklist.", b:"Fast delivery. No surprise fees. Local price. Local platform. Aim to pass all four in every market you enter."},
            {h:"One store, local everywhere.", b:"CJ Dropshipping handles the shelf. WorldFirst handles the bank. Save this for your next market launch."}
          ],
          caption:"How to sell like a local in 20+ European markets at once 🇪🇺 With @cjdropshipping. Save for your next market launch.  #dropshipping #ecommerce #europe #worldfirst"},
        { name:"C · The 2026 dropshipping playbook", meta:"playbook · 8 slides · collab: +Andy",
          desc:"<b>The state-of-the-game piece.</b> What stopped working, what works now, and the system behind it: test cheap, deliver fast, move money free, adapt faster. Carries Andy Chou's thinking without the event frame, so his personal account joins the collab naturally.",
          slides:[
            {h:"What works in dropshipping in 2026", b:"The current playbook for selling into Europe. WorldFirst × CJ Dropshipping."},
            {h:"What stopped working.", b:"Find a product, buy cheap traffic, ride one platform. That era ended."},
            {h:"What works now.", b:"Brand, content and systems. Slower to build, but they compound."},
            {h:"Test products without inventory risk.", b:"Source per order with no minimum quantities, from 110,000+ ready-to-ship SKUs on CJ. Drop losers cheap, scale winners hard."},
            {h:"Deliver fast from inside Europe.", b:"European warehouses, delivery up to two days faster this year. Customers read speed as quality."},
            {h:"Make the money side cheap and fast.", b:"Collect locally from 130+ marketplaces, pay CJ instantly for free, earn 1% back on ads, logistics and software."},
            {h:"Start small, learn fast, iterate fast.", b:"CJ founder Andy Chou's rule for every new market, product and channel."},
            {h:"The 2026 playbook, in one line.", b:"Test cheap. Deliver fast. Move money free. Adapt faster. WorldFirst × CJ Dropshipping. Save it."}
          ],
          caption:"What's actually working for dropshippers selling into Europe in 2026. With @cjdropshipping @andychoucj. Which step are you on?  #dropshipping #ecommerce #ecommercetips #worldfirst"},
        { name:"D · Win on speed", meta:"speed economics · 8 slides · ops-forward",
          desc:"<b>The speed piece.</b> Why fast stores win, then the four places dropshippers lose days and the fix for each. Very actionable, and cuts down well into reels later.",
          slides:[
            {h:"Why fast stores win in 2026", b:"Four places dropshippers lose days, and how to get each one back. WorldFirst × CJ Dropshipping."},
            {h:"Fast delivery sells more.", b:"A clear, quick delivery promise at checkout is often the difference between your store and Amazon."},
            {h:"Fast delivery protects your store.", b:"Late orders drive refunds, disputes and one-star reviews. On-time orders keep your account healthy."},
            {h:"Speed-up 1: stock closer.", b:"Stock in Europe beats stock across an ocean. CJ: Frankfurt plus partner warehouses across the EU, up to two days faster this year."},
            {h:"Speed-up 2: source while you sell.", b:"CJ agents quote, source and manage orders, so launches don't wait on supplier back-and-forth."},
            {h:"Speed-up 3: pay instantly.", b:"A supplier payment that takes days holds every order behind it. WorldFirst pays CJ instantly, zero fees."},
            {h:"Speed-up 4: collect locally.", b:"Collect from 130+ marketplaces in local currencies, so revenue lands ready to redeploy into ads and stock."},
            {h:"One day faster at every step.", b:"CJ moves the product. WorldFirst moves the money. Save this and find your slowest step."}
          ],
          caption:"Four ways to make your dropshipping operation faster 🇪🇺 With @cjdropshipping. Save it, then fix your slowest step.  #dropshipping #supplychain #ecommerce #worldfirst"},
        { name:"E · The money loop", meta:"cash flow · 8 slides · teach-first",
          desc:"<b>The cash-flow piece.</b> Dropshipping cash flow in four stages: ads out, supplier paid, order shipped, payout in. Shorten each stage and the same store grows faster. The least-seen angle in the feed.",
          slides:[
            {h:"Get your cash back faster", b:"Dropshipping cash flow in four stages, and how to shorten each one. WorldFirst × CJ Dropshipping."},
            {h:"The cycle every store runs.", b:"Ads out. Order in. Supplier paid. Order shipped. Payout lands. Repeat. Each stage has a speed and a cost."},
            {h:"Stage 1: ad spend.", b:"Your biggest outflow. Put it on 1% cashback, along with logistics and software, and feed some back."},
            {h:"Stage 2: pay the supplier.", b:"Days-long transfers stall every order behind them. WorldFirst to CJ is instant, with zero transaction fees."},
            {h:"Stage 3: ship the order.", b:"European warehouses and delivery up to two days faster keep customers calm and disputes down."},
            {h:"Stage 4: get paid.", b:"Collect from 130+ marketplaces in local currencies. Hold, convert when the rate suits, redeploy."},
            {h:"Shorter cycle, faster growth.", b:"Shorten each stage and the same store grows quicker on the same orders."},
            {h:"Check your four stages this week.", b:"CJ Dropshipping × WorldFirst. Save this and time each stage of yours."}
          ],
          caption:"Dropshipping cash flow in four stages, and how to shorten each one 🔁 With @cjdropshipping. Save it and time yours.  #dropshipping #cashflow #ecommerce #worldfirst"}
      ] }
  ]
};
/* === DECK END === */

const CHECK='<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
/* No hard caps: every section is free multi-select. `pick` is a SUGGESTED count only. */
const state={}, notes={};
DECK.sections.forEach(s=>{ state[s.key]= new Set(); notes[s.key]={}; });

document.getElementById('title').textContent=DECK.title||'Deck';
document.getElementById('intro').textContent=DECK.intro||'';
document.getElementById('stamp').textContent=DECK.stamp||'';
if(DECK.globalNote){ document.getElementById('globalWrap').style.display='block';
  document.getElementById('gnoteLabel').textContent=DECK.globalNote.label||'Notes';
  document.getElementById('gnote').placeholder=DECK.globalNote.placeholder||''; }

const root=document.getElementById('sections');
DECK.sections.forEach(s=>{
  const h=document.createElement('h2'); h.innerHTML=`${s.label} <span class="ct" id="ct-${s.key}"></span>`; root.appendChild(h);
  if(s.sub){ const p=document.createElement('p'); p.className='sub'; p.textContent=s.sub; root.appendChild(p); }
  const box=document.createElement('div'); box.id='sec-'+s.key; root.appendChild(box);
  s.items.forEach((o,i)=> box.appendChild(card(s,i,o)));
});

function card(s,i,o){
  const el=document.createElement('div'); el.className='card'; el.dataset.k=s.key; el.dataset.i=i;
  const rec=o.rec?'<span class="rec">★ rec</span>':'';
  const tag=o.tag?`<span class="tag">${o.tag}</span>`:'';
  const meta=o.meta?`<div class="meta">${o.meta}</div>`:'';
  const strip=o.slides?`<div class="strip">${o.slides.map((sl,n)=>`<div class="tile"><div class="n">slide ${n+1} / ${o.slides.length}</div><div class="h">${sl.h}</div><div class="b">${sl.b}</div></div>`).join('')}</div>`:'';
  const cap=o.caption?`<div class="cap"><div class="cl">caption</div><div class="cx">${o.caption}</div></div>`:'';
  const note=s.notes?`<div class="note"><label>your note (optional)</label><textarea placeholder="note on this pick..."></textarea></div>`:'';
  el.innerHTML=`<div class="row"><div class="tick">${CHECK}</div><div class="body"><div class="name">${o.name}${rec}${tag}</div>${meta}<div class="desc">${o.desc||''}</div>${strip}${cap}${note}</div></div>`;
  el.addEventListener('click',e=>{ if(e.target.tagName==='TEXTAREA')return; toggle(s,i,el); });
  const ta=el.querySelector('textarea'); if(ta){ ta.addEventListener('click',e=>e.stopPropagation()); ta.addEventListener('input',e=>{ notes[s.key][i]=e.target.value; }); }
  return el;
}
function toggle(s,i,el){
  const set=state[s.key];
  if(set.has(i)){ set.delete(i); el.classList.remove('sel'); }
  else { set.add(i); el.classList.add('sel'); }
  update();
}
function selCount(s){ return state[s.key].size; }
function totalCount(){ return DECK.sections.reduce((t,s)=>t+selCount(s),0); }
function update(){
  DECK.sections.forEach(s=>{ const c=document.getElementById('ct-'+s.key); c.textContent=`suggest ${s.pick} · ${selCount(s)} selected`; c.className='ct'+(selCount(s)>0?' full':''); });
  const total=totalCount(); const btn=document.getElementById('copy'); btn.disabled=total===0; btn.classList.remove('done'); btn.textContent='Copy prompt';
  document.getElementById('status').innerHTML = total===0
    ? 'Select anything. No limits, the prompt carries whatever you pick.'
    : `<b>${total}</b> pick${total===1?'':'s'} in the prompt. Suggested counts are guidance only.`;
}
function buildPrompt(){
  let L=['== '+(DECK.promptHeader||'deck')+' =='];
  DECK.sections.forEach(s=>{
    if(selCount(s)===0) return;
    L.push(`${s.label} (${selCount(s)} picked, ${s.pick} suggested):`);
    [...state[s.key]].forEach((i,n)=>{ const o=s.items[i]; const nt=notes[s.key][i]?` [note: ${notes[s.key][i].trim()}]`:''; L.push(`  ${n+1}. ${o.name}${nt}`); });
  });
  const g=DECK.globalNote? document.getElementById('gnote').value.trim():'';
  if(g) L.push('NOTES: '+g);
  L.push('> Counts are my call, work with exactly what I ticked.');
  if(DECK.promptAction) L.push('> '+DECK.promptAction);
  return L.join('\n');
}
document.getElementById('copy').addEventListener('click',async()=>{
  const txt=buildPrompt();
  try{ await navigator.clipboard.writeText(txt); }catch(e){ const ta=document.createElement('textarea'); ta.value=txt; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); }
  const b=document.getElementById('copy'); b.classList.add('done'); b.textContent='Copied · paste it to Claude'; setTimeout(()=>{ if(!b.disabled){b.classList.remove('done'); b.textContent='Copy prompt';} },2600);
});
update();
</script>
</body>
</html>
